# Routes /api/* to backend service, everything else to frontend

# kubernetes/secrets.yaml
# IMPORTANT: Never commit real values here — use sealed-secrets or external-secrets-operator
# To create: kubectl create secret generic farm2home-secrets --from-env-file=.env -n farm2home

apiVersion: v1
kind: Secret
metadata:
  name: farm2home-secrets
  namespace: farm2home
type: Opaque
stringData:
  MONGO_URI: "mongodb://mongo-service:27017/farm2home"
  JWT_SECRET: "REPLACE_WITH_REAL_SECRET"
  RAZORPAY_KEY_ID: "REPLACE_WITH_REAL_KEY"
  RAZORPAY_KEY_SECRET: "REPLACE_WITH_REAL_SECRET"
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_REAL_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_REAL_SECRET"

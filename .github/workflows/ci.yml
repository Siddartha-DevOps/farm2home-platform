name: Farm2Home Multi-Service CI

on:
  push:
    branches:
      - main

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, product-service, order-service]

    steps:
      # Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Debug: list files (optional, remove later)
      - name: List repo files
        run: ls -R

      # Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t farm2home-${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      # Scan image with Trivy
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: farm2home-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Tag and push image
      - name: Tag & Push Docker Image
        run: |
          docker tag farm2home-${{ matrix.service }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/farm2home-${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/farm2home-${{ matrix.service }}:latest
